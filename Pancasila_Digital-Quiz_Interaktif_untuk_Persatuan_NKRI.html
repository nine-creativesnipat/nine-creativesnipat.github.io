<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pancasila Digital - Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Nunito', sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #d00000 0%, #e63946 40%, #f8f9fa 60%, #ffffff 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #222;
        overflow-x: hidden;
    }

    header {
        text-align: center;
        padding: 30px 20px 10px;
        color: white;
        text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
    }

    h1 { margin: 0; font-weight: 900; font-size: 2.2rem; }
    .tagline { opacity: 0.9; font-size: 1.1rem; margin-top: 5px; }

    .container {
        width: 90%;
        max-width: 600px;
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        margin-top: 20px;
        animation: fadeIn 0.5s ease-out;
        z-index: 10;
        position: relative;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h2, h3 { margin-top: 0; color: #333; }
    
    #question {
        font-size: 1.2rem;
        line-height: 1.5;
        margin-bottom: 20px;
        color: #111;
    }

    button {
        width: 100%;
        padding: 14px 20px;
        margin: 8px 0;
        border: 2px solid transparent;
        border-radius: 12px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s ease-in-out;
        font-family: 'Nunito', sans-serif;
    }

    .start-btn { 
        background: #0abf53; 
        color: white; 
        font-size: 18px; 
        box-shadow: 0 4px 15px rgba(10, 191, 83, 0.4);
    }
    .start-btn:hover { background: #09a045; transform: scale(1.02); }

    .option {
        background: #f8f9fa;
        color: #333;
        border: 2px solid #e9ecef;
        text-align: left;
    }

    .option:hover:not(:disabled) {
        background: #e2e6ea;
        border-color: #ced4da;
        transform: translateY(-2px);
    }

    .correct { background: #0abf53 !important; color: white !important; border-color: #0abf53 !important; }
    .wrong { background: #e63946 !important; color: white !important; border-color: #e63946 !important; }

    .center { text-align: center; }
    .hidden { display: none !important; }

    .info-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px dashed #eee;
    }

    #timer {
        font-weight: 900;
        color: #d00000;
        background: #ffe6e6;
        padding: 5px 15px;
        border-radius: 20px;
    }

    #score {
        font-weight: bold;
        color: #d00000;
        font-size: 1.1rem;
    }

    .badge {
        background: linear-gradient(45deg, #ffd60a, #ff9f1c);
        color: #fff;
        padding: 12px;
        border-radius: 12px;
        font-weight: 900;
        font-size: 1.2rem;
        margin: 20px 0;
        box-shadow: 0 4px 15px rgba(255, 214, 10, 0.4);
        text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }

    .share-card {
        background: #f8f9fa;
        padding: 30px;
        border-radius: 20px;
        border: 2px solid #eee;
        text-align: center;
        display: inline-block;
        width: 100%;
        box-sizing: border-box;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        50% { transform: translateX(6px); }
        75% { transform: translateX(-6px); }
    }
    .shake { animation: shake 0.4s; }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 100;
    }

    .action-btn {
        background: #d00000;
        color: white;
    }
    .action-btn:hover { background: #a00000; }

    .download-btn {
        background: #1e90ff;
        color: white;
        box-shadow: 0 4px 15px rgba(30, 144, 255, 0.4);
    }
    .download-btn:hover { background: #0073e6; transform: scale(1.02); }
</style>
</head>

<body>

<header>
    <h1>Pancasila Digital</h1>
    <div class="tagline">Ikhlas Berteknologi Bangun NKRI</div>
</header>

<div id="welcome" class="container center">
    <h2>Selamat Datang!</h2>
    <p>Mari uji pemahamanmu tentang penerapan nilai-nilai luhur Pancasila di era digital dan sosial media.</p>
    <br>
    <button class="start-btn" onclick="startQuiz()">Mulai Quiz Sekarang</button>
</div>

<div id="quiz" class="container hidden">
    <div class="info-bar">
        <div id="score">Skor: 0</div>
        <div id="timer">⏳ 20s</div>
    </div>
    <h3 id="question"></h3>
    <div id="options"></div>
</div>

<div id="result" class="container hidden center">
    <h2>Hasil Akhir</h2>
    <h3 id="finalScore" style="font-size: 1.8rem; margin: 10px 0;"></h3>
    <div id="badgeContainer" class="badge">🏆 Pahlawan NKRI Digital</div>
    <p id="feedbackText"></p>
    <button class="start-btn" onclick="showShare()">Lihat Sertifikat & Bagikan</button>
    <button class="action-btn" onclick="restartQuiz()">Main Lagi</button>
</div>

<div id="shareScreen" class="container hidden center">
    <div class="share-card" id="cardToDownload">
        <h2 id="shareTextTitle" style="color:#d00000; margin-bottom: 5px;"></h2>
        <h3 id="shareTextDesc"></h3>
        <p style="color:#555; font-size: 0.9rem;">Tunjukkan hasilmu kepada teman-teman!</p>
    </div>
    <br>
    <button class="download-btn" onclick="downloadImage()">💾 Download Gambar (PNG)</button>
    <button class="action-btn" onclick="restartQuiz()">Kembali ke Awal</button>
</div>

<img id="watermark" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg9VQeePTiFMqxy5ZikUm1i4uDsfjKP4FkZJje1DNdVJzycGpS4VmZNn_hfUcmM5Mrs9d36uTCHU99zUOo4IrQQpXewHdCZ6nllPOqj7Szfp9IhTSV9a0fwCWETY0N13USYWXvg2BohgcLwVoIAcFvjWG1FDsiAIbXjADUNarH7jyjwO2bstGfAJf7jsYE2/s1024/Gemini_Generated_Image_6g7h316g7h316g7h.png" style="position:fixed; bottom:15px; right:15px; width:60px; height:60px; opacity:0.8; border-radius:50%; z-index:1000;">

<canvas id="confetti"></canvas>

<script>
// SOAL
const questions = [
    {
        question: "Di forum online terjadi perdebatan perbedaan keyakinan. Sikap yang sesuai dengan sila pertama adalah...",
        options: [
            "Menghina keyakinan lain dengan akun palsu",
            "Menghindari semua diskusi dan memblokir orangnya",
            "Menghormati perbedaan dan berdiskusi secara santun",
            "Memaksakan keyakinan pribadi kepada mereka"
        ],
        correct: 2
    },
    {
        question: "Seorang teman menjadi korban cyberbullying di media sosial. Sikap sesuai sila kedua adalah...",
        options: [
            "Ikut menyebarkan aibnya karena viral",
            "Membiarkan saja karena tidak ingin ikut campur",
            "Melaporkan akun pelaku dan memberi dukungan mental ke korban",
            "Membalas dengan ujaran kebencian di kolom komentar"
        ],
        correct: 2
    },
    {
        question: "Sikap yang paling tepat saat menerima berita provokatif (hoax) di grup obrolan adalah...",
        options: [
            "Langsung meneruskan ke grup lain agar semua waspada",
            "Memeriksa kebenaran informasi dari sumber terpercaya",
            "Menghina pengirim berita di dalam grup",
            "Menyebarkannya ke kelompok tertentu yang sepaham"
        ],
        correct: 1
    },
    {
        question: "Menentukan keputusan bersama mengenai proyek digital melalui diskusi online mencerminkan nilai...",
        options: [
            "Ketuhanan",
            "Persatuan",
            "Kemanusiaan",
            "Musyawarah / Kerakyatan"
        ],
        correct: 3
    },
    {
        question: "Penyediaan akses internet gratis agar seluruh lapisan siswa bisa belajar daring mencerminkan sila...",
        options: [
            "Ketuhanan Yang Maha Esa",
            "Persatuan Indonesia",
            "Kerakyatan yang Dipimpin oleh Hikmat Kebijaksanaan",
            "Keadilan Sosial bagi Seluruh Rakyat Indonesia"
        ],
        correct: 3
    }
];

let shuffled = [];
let current = 0;
let score = 0;
let timer;
let timeLeft = 20;

// SYNTHESIZED SOUND (Web Audio API)
function playSound(isCorrect) {
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        
        osc.frequency.value = isCorrect ? 800 : 300; 
        osc.type = 'sine';
        
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.5);
        
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
    } catch(e) { console.log("Audio API tidak didukung"); }
}

// RANDOM ARRAY
function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

function startQuiz() {
    document.getElementById("welcome").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    shuffled = shuffle([...questions]);
    current = 0;
    score = 0;
    showQuestion();
}

function showQuestion() {
    clearInterval(timer);
    timeLeft = 20;
    updateTimerUI();

    let q = shuffled[current];
    document.getElementById("question").textContent = (current + 1) + ". " + q.question;
    document.getElementById("score").textContent = "Skor: " + score;

    let optHTML = "";
    q.options.forEach((opt, i) => {
        optHTML += `<button class="option" onclick="selectAnswer(${i})">${opt}</button>`;
    });
    document.getElementById("options").innerHTML = optHTML;

    // Timer Logic
    timer = setInterval(() => {
        timeLeft--;
        updateTimerUI();
        if (timeLeft <= 0) {
            clearInterval(timer);
            playSound(false);
            
            let buttons = document.querySelectorAll(".option");
            let correct = shuffled[current].correct;
            buttons.forEach(btn => btn.disabled = true);
            buttons[correct].classList.add("correct");
            
            setTimeout(nextQuestion, 1200);
        }
    }, 1000);
}

function updateTimerUI() {
    document.getElementById("timer").textContent = "⏳ " + timeLeft + "s";
    if(timeLeft <= 5) {
        document.getElementById("timer").style.color = "white";
        document.getElementById("timer").style.background = "#d00000";
    } else {
        document.getElementById("timer").style.color = "#d00000";
        document.getElementById("timer").style.background = "#ffe6e6";
    }
}

function selectAnswer(i) {
    clearInterval(timer);
    let buttons = document.querySelectorAll(".option");
    let correct = shuffled[current].correct;
    let isCorrect = (i === correct);

    playSound(isCorrect);

    buttons.forEach((btn, index) => {
        btn.disabled = true;
        if (index === correct) btn.classList.add("correct");
        if (index === i && !isCorrect) {
            btn.classList.add("wrong");
            btn.classList.add("shake");
        }
    });

    if (isCorrect) score++;

    setTimeout(nextQuestion, 1000);
}

function nextQuestion() {
    current++;
    if (current >= shuffled.length) {
        showResult();
    } else {
        showQuestion();
    }
}

function showResult() {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    document.getElementById("finalScore").textContent = "Skor Kamu: " + score + " / " + questions.length;
    
    let feedback = "";
    if(score === 5) {
        feedback = "Luar biasa! Pemahaman nilai Pancasila kamu sangat sempurna.";
        startConfetti();
    } else if (score >= 3) {
        feedback = "Bagus sekali! Kamu sudah memahami dasar Pancasila di era digital.";
    } else {
        document.getElementById("badgeContainer").classList.add("hidden");
        feedback = "Jangan menyerah! Mari pelajari lagi nilai-nilai Pancasila.";
    }
    document.getElementById("feedbackText").textContent = feedback;
}

function restartQuiz() {
    location.reload();
}

// SHARE SCREEN
function showShare() {
    document.getElementById("result").classList.add("hidden");
    document.getElementById("shareScreen").classList.remove("hidden");

    let kategori = "Cukup";
    if (score >= 3) kategori = "Baik";
    if (score === 5) kategori = "Sempurna 🌟";

    document.getElementById("shareTextTitle").textContent = `Skor Akhir: ${score}/5`;
    document.getElementById("shareTextDesc").innerHTML = 
        `Literasi Pancasila Digital saya masuk kategori:<br><br><span style="font-size:1.5em; color:#0abf53;"><b>${kategori}</b></span>`;
}

// LOGIKA GENERATE & DOWNLOAD GAMBAR (100% INTERNAL HTML5 CANVAS)
function downloadImage() {
    const cvs = document.createElement('canvas');
    cvs.width = 1080;
    cvs.height = 1080;
    const ctx = cvs.getContext('2d');

    // 1. Gambar Latar Belakang (Gradien Merah Putih)
    const grad = ctx.createLinearGradient(0, 0, 1080, 1080);
    grad.addColorStop(0, '#d00000');
    grad.addColorStop(0.5, '#e63946');
    grad.addColorStop(1, '#ffffff');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 1080, 1080);

    // 2. Efek Bayangan untuk Kartu
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 40;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 20;

    // 3. Gambar Kartu Kotak Putih di Tengah (Rounded Corners)
    const cardX = 140, cardY = 240, cardW = 800, cardH = 600, radius = 40;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(cardX + radius, cardY);
    ctx.lineTo(cardX + cardW - radius, cardY);
    ctx.quadraticCurveTo(cardX + cardW, cardY, cardX + cardW, cardY + radius);
    ctx.lineTo(cardX + cardW, cardY + cardH - radius);
    ctx.quadraticCurveTo(cardX + cardW, cardY + cardH, cardX + cardW - radius, cardY + cardH);
    ctx.lineTo(cardX + radius, cardY + cardH);
    ctx.quadraticCurveTo(cardX, cardY + cardH, cardX, cardY + cardH - radius);
    ctx.lineTo(cardX, cardY + radius);
    ctx.quadraticCurveTo(cardX, cardY, cardX + radius, cardY);
    ctx.closePath();
    ctx.fill();

    // Reset Shadow agar teks tidak berbayang kotor
    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;

    // 4. Gambar Teks ke dalam Kartu
    ctx.textAlign = 'center';
    
    // Judul
    ctx.fillStyle = '#d00000';
    ctx.font = 'bold 65px sans-serif';
    ctx.fillText('Pancasila Digital', 540, 360);
    
    // Sub-judul
    ctx.fillStyle = '#666666';
    ctx.font = '30px sans-serif';
    ctx.fillText('Ikhlas Berteknologi Bangun NKRI', 540, 420);

    // Garis Pemisah
    ctx.fillStyle = '#eeeeee';
    ctx.fillRect(240, 470, 600, 4);

    // Skor
    ctx.fillStyle = '#222222';
    ctx.font = 'bold 90px sans-serif';
    ctx.fillText(`Skor: ${score} / 5`, 540, 590);

    // Kategori
    let kategori = "Cukup";
    let color = "#e63946"; // Merah
    if (score >= 3) { kategori = "Baik"; color = "#0abf53"; } // Hijau
    if (score === 5) { kategori = "Sempurna ★"; color = "#ff9f1c"; } // Emas

    ctx.fillStyle = color;
    ctx.font = 'bold 70px sans-serif';
    ctx.fillText(`Kategori: ${kategori}`, 540, 710);

    // Footer / Watermark Text di gambar
    ctx.fillStyle = '#aaaaaa';
    ctx.font = 'italic 25px sans-serif';
    ctx.fillText('Ayo uji juga pemahamanmu!', 540, 800);

    // 5. Proses Download Otomatis
    const link = document.createElement('a');
    link.download = `Hasil_Pancasila_Digital_${score}.png`;
    link.href = cvs.toDataURL('image/png');
    link.click();
}

// CONFETTI ANIMATION
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
let pieces = [];
let animationFrameId;
const colors = ['#f44336', '#e91e63', '#9c27b0', '#3f51b5', '#2196f3', '#4caf50', '#ffeb3b', '#ff9800'];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function startConfetti() {
    pieces = [];
    for (let i = 0; i < 150; i++) {
        pieces.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            size: (Math.random() * 8) + 4,
            speedY: (Math.random() * 3) + 2,
            speedX: (Math.random() * 2) - 1,
            color: colors[Math.floor(Math.random() * colors.length)],
            rotation: Math.random() * 360,
            rotationSpeed: (Math.random() * 10) - 5
        });
    }
    if(!animationFrameId) animate();
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let active = false;
    
    pieces.forEach(p => {
        ctx.save();
        ctx.fillStyle = p.color;
        ctx.translate(p.x + p.size/2, p.y + p.size/2);
        ctx.rotate(p.rotation * Math.PI / 180);
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();

        p.y += p.speedY;
        p.x += p.speedX;
        p.rotation += p.rotationSpeed;
        
        if (p.y < canvas.height) active = true; 
    });
    
    if(active){
        animationFrameId = requestAnimationFrame(animate);
    } else {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
    }
}
</script>

</body>
</html>
